name: Publish

on:
  release:
    types: [published]

jobs:
  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Publish to npm
        run: npm publish --access public
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Stage native dependency for vsce packaging
        # bun install compiled better-sqlite3 for this platform at the workspace root.
        # Copy it (and its two runtime deps) into the ext directory so vsce bundles them.
        # npm install fails here because the ext's package.json has workspace-only devDeps
        # that npm can't resolve from the registry.
        run: |
          mkdir -p apps/vscode-ext/node_modules
          cp -rL node_modules/better-sqlite3 apps/vscode-ext/node_modules/better-sqlite3
          cp -rL node_modules/bindings       apps/vscode-ext/node_modules/bindings       2>/dev/null || true
          cp -rL node_modules/file-uri-to-path apps/vscode-ext/node_modules/file-uri-to-path 2>/dev/null || true

      - name: Install vsce
        run: bun add -g @vscode/vsce

      - name: Build extension
        run: node esbuild.mjs
        working-directory: apps/vscode-ext

      - name: Publish to VS Code Marketplace
        run: vsce publish -p ${{ secrets.VSCE_PAT }} || true
        working-directory: apps/vscode-ext
