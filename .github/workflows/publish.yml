name: Publish

on:
  release:
    types: [published]

jobs:
  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Publish to npm
        run: npm publish --access public || true
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Stage native dependency for vsce packaging
        # better-sqlite3 is a native module — it can't be bundled by esbuild and must be
        # shipped in node_modules alongside the extension JS. We can't run npm install in
        # the ext directory because its package.json has workspace-only devDeps that npm
        # can't resolve from the registry. Instead, install into a clean temp directory
        # and copy the compiled binary + its two runtime deps into the ext's node_modules.
        run: |
          tmpdir=$(mktemp -d)
          cd "$tmpdir" && npm init -y && npm install better-sqlite3
          mkdir -p $GITHUB_WORKSPACE/apps/vscode-ext/node_modules
          # bun install creates symlinks to its own ABI-incompatible cache; remove them
          # first so we can place the Node.js-compiled binary in their place.
          rm -rf $GITHUB_WORKSPACE/apps/vscode-ext/node_modules/better-sqlite3
          rm -rf $GITHUB_WORKSPACE/apps/vscode-ext/node_modules/bindings
          rm -rf $GITHUB_WORKSPACE/apps/vscode-ext/node_modules/file-uri-to-path
          cp -r "$tmpdir/node_modules/better-sqlite3"    $GITHUB_WORKSPACE/apps/vscode-ext/node_modules/
          cp -r "$tmpdir/node_modules/bindings"          $GITHUB_WORKSPACE/apps/vscode-ext/node_modules/ 2>/dev/null || true
          cp -r "$tmpdir/node_modules/file-uri-to-path"  $GITHUB_WORKSPACE/apps/vscode-ext/node_modules/ 2>/dev/null || true

      - name: Install vsce
        run: bun add -g @vscode/vsce

      - name: Build extension
        run: node esbuild.mjs
        working-directory: apps/vscode-ext

      - name: Publish to VS Code Marketplace
        run: vsce publish -p ${{ secrets.VSCE_PAT }} || true
        working-directory: apps/vscode-ext
